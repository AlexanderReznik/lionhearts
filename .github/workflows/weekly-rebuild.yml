name: Weekly rebuild

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel redeploy
        run: curl -sf -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
